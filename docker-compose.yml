services:

  api1:
    build: .
    container_name: grupo-a-api-1
    environment:
      PORT: 3000
      SERVICE_ID: 16

      CORE_SERVICE_URL: http://host.docker.internal:8080
      CORE_API_KEY: ${CORE_API_KEY}

      RABBITMQ_URL: amqp://guest:guest@grupo-a-rabbitmq:5672
      RABBITMQ_MAX_RETRIES: 60
      RABBITMQ_RETRY_DELAY_MS: 5000

      DB_HOST: grupo-a-postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ridefleet

      SERVICE_URL: ${PUBLIC_API1_URL:-http://host.docker.internal:3002}
      CONTACT_EMAIL: gabriel.a.santos@ufv.br

      CORE_AUCTION_TIMEOUT_SECONDS: 10

    depends_on:
      - postgres
      - rabbitmq

    ports:
      - "3002:3000"

    restart: always
    networks:
      grupo-net:
        aliases:
          - api1
          - grupo-a-api-1

    extra_hosts:
      - "host.docker.internal:host-gateway"


  api2:
    build: .
    container_name: grupo-a-api-2
    environment:
      PORT: 3000
      SERVICE_ID: 17

      CORE_SERVICE_URL: http://host.docker.internal:8080
      CORE_API_KEY: ${CORE_API_KEY}

      RABBITMQ_URL: amqp://guest:guest@grupo-a-rabbitmq:5672
      RABBITMQ_MAX_RETRIES: 60
      RABBITMQ_RETRY_DELAY_MS: 5000

      DB_HOST: grupo-a-postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ridefleet

      SERVICE_URL: ${PUBLIC_API2_URL:-http://host.docker.internal:3003}
      CONTACT_EMAIL: gabriel.a.santos@ufv.br

      CORE_AUCTION_TIMEOUT_SECONDS: 10

    depends_on:
      - postgres
      - rabbitmq

    ports:
      - "3003:3000"

    restart: always
    networks:
      grupo-net:
        aliases:
          - api2
          - grupo-a-api-2

    extra_hosts:
      - "host.docker.internal:host-gateway"


  loadbalancer:
    image: nginx:latest
    container_name: grupo-a-loadbalancer
    ports:
      - "3001:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api1
      - api2
    restart: always
    networks:
      grupo-net:
        aliases:
          - loadbalancer
          - grupo-a-loadbalancer


  postgres:
    image: postgres:16
    container_name: grupo-a-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ridefleet
    ports:
      - "5433:5432"
    volumes:
      - ridefleet_postgres_data:/var/lib/postgresql/data
      - ./full_dump.sql:/docker-entrypoint-initdb.d/full_dump.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: always
    networks:
      grupo-net:
        aliases:
          - postgres
          - grupo-a-postgres


  rabbitmq:
    image: rabbitmq:3-management
    container_name: grupo-a-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: always
    networks:
      grupo-net:
        aliases:
          - rabbitmq
          - grupo-a-rabbitmq


  prometheus:
    image: prom/prometheus
    container_name: grupo-a-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: always
    networks:
      grupo-net:
        aliases:
          - prometheus
          - grupo-a-prometheus


  grafana:
    image: grafana/grafana
    container_name: grupo-a-grafana
    ports:
      - "3011:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/overview.json
    volumes:
      - ./core/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./core/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: always
    networks:
      grupo-net:
        aliases:
          - grafana
          - grupo-a-grafana


volumes:
  ridefleet_postgres_data:


networks:
  grupo-net:
    external: true


