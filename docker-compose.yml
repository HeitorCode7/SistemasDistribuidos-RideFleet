services:

  api1:
    build: .
    container_name: grupo-a-api-1

    environment:
      PORT: 3000
      SERVICE_ID: 16

      RABBITMQ_URL: amqp://guest:guest@grupo-a-rabbitmq:5672

      DB_HOST: grupo-a-postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ridefleet

      CORE_SERVICE_URL: http://host.docker.internal:8080
      CORE_API_KEY: ${CORE_API_KEY}
      SERVICE_URL: http://host.docker.internal:3001
      CONTACT_EMAIL: gabriel.a.santos@ufv.br
      CORE_AUCTION_TIMEOUT_SECONDS: 10

    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

    restart: always


  api2:
    build: .
    container_name: grupo-a-api-2

    environment:
      PORT: 3000
      SERVICE_ID: 16

      RABBITMQ_URL: amqp://guest:guest@grupo-a-rabbitmq:5672

      DB_HOST: grupo-a-postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ridefleet

      CORE_SERVICE_URL: http://host.docker.internal:8080
      CORE_API_KEY: ${CORE_API_KEY}
      SERVICE_URL: http://host.docker.internal:3001
      CONTACT_EMAIL: gabriel.a.santos@ufv.br
      CORE_AUCTION_TIMEOUT_SECONDS: 10

    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

    restart: always


  loadbalancer:
    image: nginx:latest
    container_name: grupo-a-loadbalancer

    ports:
      - "3001:80"

    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started

    restart: always


  postgres:
    image: postgres:16
    container_name: grupo-a-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ridefleet

    ports:
      - "5433:5432"

    volumes:
      - grupo_a_postgres_data:/var/lib/postgresql/data

    restart: on-failure

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10


  rabbitmq:
    image: rabbitmq:3-management
    container_name: grupo-a-rabbitmq

    ports:
      - "5673:5672"
      - "15673:15672"

    volumes:
      - grupo_a_rabbitmq_data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

    restart: always


  prometheus:
    image: prom/prometheus
    container_name: grupo-a-prometheus

    ports:
      - "9091:9090"

    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml

    restart: always


  grafana:
    image: grafana/grafana
    container_name: grupo-a-grafana

    ports:
      - "3011:3000"

    restart: always


volumes:
  grupo_a_postgres_data:
  grupo_a_rabbitmq_data: