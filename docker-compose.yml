services:

  api1:
    build: .
    container_name: ridefleet-api-1

    environment:
      PORT: 3000
      SERVICE_ID: grupo-a-api1

      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ridefleet

    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

    restart: always



  api2:
    build: .
    container_name: ridefleet-api-2

    environment:
      PORT: 3000
      SERVICE_ID: grupo-a-api2

      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ridefleet

    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

    restart: always


  loadbalancer:
    image: nginx:latest
    container_name: ridefleet-loadbalancer

    ports:
      - "3000:80"

    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started

    restart: always


  postgres:
    image: postgres:16
    container_name: ridefleet-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ridefleet

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: on-failure

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10


  rabbitmq:
    image: rabbitmq:3-management
    container_name: ridefleet-rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

    restart: always


  prometheus:
    image: prom/prometheus
    container_name: ridefleet-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml

    restart: always


  grafana:
    image: grafana/grafana
    container_name: ridefleet-grafana

    ports:
      - "3010:3000"

    restart: always


volumes:
  postgres_data:
  rabbitmq_data: