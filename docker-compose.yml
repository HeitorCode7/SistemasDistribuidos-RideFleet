services:

  api:
    build: .
    container_name: ridefleet-api

    ports:
      - "3000:3000"

    environment:
      PORT: 3000
      RABBITMQ_URL: amqp://rabbitmq

    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ridefleet-rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

  prometheus:
    image: prom/prometheus
    container_name: ridefleet-prometheus

    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: ridefleet-grafana

    ports:
      - "3010:3000"