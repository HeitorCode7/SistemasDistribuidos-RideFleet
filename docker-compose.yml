services:

  api:
    build: .
    container_name: ridefleet-api

    ports:
      - "3000:3000"

    environment:
      PORT: 3000

      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ridefleet

    depends_on:
      postgres:
        condition: service_healthy

      rabbitmq:
        condition: service_started

    restart: always

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health | grep -q '\"status\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16
    container_name: ridefleet-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ridefleet

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: on-failure

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ridefleet-rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

    restart: always

  prometheus:
    image: prom/prometheus
    container_name: ridefleet-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml

    restart: always

  grafana:
    image: grafana/grafana
    container_name: ridefleet-grafana

    ports:
      - "3010:3000"

    restart: always

volumes:
  postgres_data: