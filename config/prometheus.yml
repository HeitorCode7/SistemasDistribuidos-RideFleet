global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ridefleet-apis"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "api1:3000"
          - "api2:3000"

  - job_name: "rabbitmq"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "grupo-a-rabbitmq:15692"

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "prometheus:9090"
