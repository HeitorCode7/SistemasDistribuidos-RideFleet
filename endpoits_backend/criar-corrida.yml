info:
  name: criar-corrida
  type: http

http:
  method: POST
  url: http://localhost:3000/api/rides
  body:
    type: json
    data: |-
      {
              "passengerId": "5",
              "origin": "UFV",
              "destination": "Centro"
            }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
