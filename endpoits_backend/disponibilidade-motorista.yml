info:
  name: disponibilidade-motorista
  type: http

http:
  method: GET
  url: http://localhost:3000/api/drivers?available=false
  params:
    - name: available
      value: "false"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
